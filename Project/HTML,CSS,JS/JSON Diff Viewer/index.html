<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Diff</title>
<style>
:root {
  --bg:             #0D1117;
  --surface:        #161B22;
  --border:         #30363D;
  --text:           #E6EDF3;
  --muted:          #8B949E;
  --add-bg:         rgba(46, 160, 67, 0.12);
  --add-text:       #3FB950;
  --add-border:     rgba(63, 185, 80, 0.35);
  --rem-bg:         rgba(218, 54, 51, 0.12);
  --rem-text:       #F85149;
  --rem-border:     rgba(248, 81, 73, 0.35);
  --chg-bg:         rgba(158, 106, 3, 0.12);
  --chg-text:       #D29922;
  --chg-border:     rgba(210, 153, 34, 0.35);
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
  --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --radius: 6px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────── */
header {
  flex-shrink: 0;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
}

header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -.02em;
}

.badge {
  font-size: 11px;
  font-family: var(--mono);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 9px;
  border-radius: 100px;
  color: var(--muted);
}

/* ── Input panes ─────────────────────────────────── */
.inputs {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 220px;
  border-bottom: 1px solid var(--border);
}

.pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

.pane:last-child {
  border-right: none;
}

.pane-label {
  flex-shrink: 0;
  padding: 7px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.pane-status {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
}

.pane-status.ok  { 
color: var(--add-text); 
}
.pane-status.err { 
color: var(--rem-text);
 }

textarea {
  flex: 1;
  background: var(--bg);
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.65;
  padding: 12px 14px;
  resize: none;
  outline: none;
  white-space: pre;
  overflow: auto;
  tab-size: 2;
}

textarea::placeholder {
  color: var(--muted);
  opacity: .45;
}

/* ── Toolbar ────────────────────────────────────── */
.toolbar {
  flex-shrink: 0;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.summary {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.pill {
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid;
  cursor: default;
}

.pill.add { 
background: var(--add-bg); 
color: var(--add-text); 
border-color: var(--add-border);
 }
.pill.rem { 
background: var(--rem-bg);
 color: var(--rem-text);
  border-color: var(--rem-border);
   }
.pill.chg {
 background: var(--chg-bg); 
 color: var(--chg-text);
  border-color: var(--chg-border);
   }
.pill.eq  { 
background: transparent;
   color: var(--muted);    
   border-color: var(--border);    
    }

.toggle-btn {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11.5px;
  padding: 3px 10px;
  border-radius: 100px;
  cursor: pointer;
  font-family: var(--sans);
  transition: color .15s, border-color .15s;
}

.toggle-btn:hover  { 
color: var(--text);
 border-color: var(--muted);  
 }
.toggle-btn.active { color: var(--text); border-color: var(--add-text); }

/* ── Output ─────────────────────────────────────── */
.output {
  flex: 1;
  overflow: auto;
  padding: 14px 20px;
}

.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  height: 100%;
  color: var(--muted);
  font-size: 13.5px;
}

.empty svg    { 
  opacity: .3;
 }
.empty strong {
   color: var(--add-text);
   }

/* ── Diff Tree ───────────────────────────────────── */
.diff-tree {
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
}

.dl {
  display: flex;
  align-items: baseline;
  padding: 0px 6px;
  margin: 1px 0;
  border-radius: 4px;
  border-left: 2px solid transparent;
}

.dl.added   { 
  background: var(--add-bg); 
  border-left-color: var(--add-text);
 }
.dl.removed { background: var(--rem-bg); 
  border-left-color: var(--rem-text);
 }
.dl.changed { background: var(--chg-bg);
   border-left-color: var(--chg-text); 
  }

/* hide unchanged when filtered */
.hide-unch .dl:not(.added):not(.removed):not(.changed) { display: none; }

.ind { 
  white-space: pre; 
  color: transparent; 
  user-select: none;
 }

.k   { color: #79C0FF; } /* key    */
.p   { color: var(--muted); } /* property */
.vs  { color: #A5D6FF; }  /* string */
.vn  { color: #79C0FF; }  /* number */
.vb  { color: #FF7B72; }  /* bool   */
.vnl { color: #FF7B72; }  /* null   */
.idx { color: #444d56; font-size: 11px; }

/* Inside added lines, unify colour */
.added   .k, .added   .p, .added   .vs, .added   .vn, .added   .vb, .added   .vnl { color: var(--add-text); }
.removed .k, .removed .p, .removed .vs, .removed .vn, .removed .vb, .removed .vnl { color: var(--rem-text); }

/* changed: key in amber, values styled individually */
.changed .k, .changed .p { color: var(--chg-text); }

.from  {
   text-decoration: line-through; 
   opacity: .55;
   }
.arrow {
   margin: 0 6px; 
   color: var(--muted); 
   }
</style>
</head>
<body>

<header>
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <rect x=".75" y=".75" width="7" height="16.5" rx="1.5" stroke="#8B949E" stroke-width="1.25"/>
    <rect x="10.25" y=".75" width="7" height="16.5" rx="1.5" stroke="#8B949E" stroke-width="1.25"/>
    <path d="M3 5h2M3 8h2M3 11h2" stroke="#8B949E" stroke-width="1.25" stroke-linecap="round"/>
    <path d="M12.5 5h2M12.5 8h2M12.5 11h2" stroke="#3FB950" stroke-width="1.25" stroke-linecap="round"/>
  </svg>
  <h1>JSON Diff</h1>
  <span class="badge">semantic · reformatting ignored</span>
</header>

<div class="inputs">
  <div class="pane">
    <div class="pane-label">
      Before
      <span class="pane-status" id="sa"></span>
    </div>
    <textarea id="ia" spellcheck="false" placeholder='Paste "before" JSON here…'></textarea>
  </div>
  <div class="pane">
    <div class="pane-label">
      After
      <span class="pane-status" id="sb"></span>
    </div>
    <textarea id="ib" spellcheck="false" placeholder='Paste "after" JSON here…'></textarea>
  </div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <div class="summary" id="summary"></div>
  <button class="toggle-btn" id="toggleBtn">Hide unchanged</button>
</div>

<div class="output" id="output">
  <div class="empty">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <path d="M4 8h22M4 15h14M4 22h18" stroke="#8B949E" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Paste JSON in both panels to compare
  </div>
</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────
  const esc = s => String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  function typeOf(v) {
    if (v === null) return 'null';
    if (Array.isArray(v)) return 'array';
    return typeof v;
  }

  // ── Diff Engine ──────────────────────────────────────────────────
  function diff(a, b) {
    const ta = typeOf(a), tb = typeOf(b);
    if (ta !== tb) return { s: 'changed', from: a, to: b };
    if (ta === 'object') return diffObj(a, b);
    if (ta === 'array')  return diffArr(a, b);
    if (a === b) return { s: 'same', v: a };
    return { s: 'changed', from: a, to: b };
  }

  function diffObj(a, b) {
    const keys = [...new Set([...Object.keys(a), ...Object.keys(b)])];
    const ch = {};
    let mixed = false;
    for (const k of keys) {
      if (!(k in a)) {
        ch[k] = { s: 'added', v: b[k] };
        mixed = true;
      } else if (!(k in b)) {
        ch[k] = { s: 'removed', v: a[k] };
        mixed = true;
      } else {
        ch[k] = diff(a[k], b[k]);
        if (ch[k].s !== 'same') mixed = true;
      }
    }
    return { s: mixed ? 'mixed' : 'same', t: 'object', ch };
  }

  function diffArr(a, b) {
    const len = Math.max(a.length, b.length);
    const ch = {};
    let mixed = false;
    for (let i = 0; i < len; i++) {
      if (i >= a.length) {
        ch[i] = { s: 'added', v: b[i] };
        mixed = true;
      } else if (i >= b.length) {
        ch[i] = { s: 'removed', v: a[i] };
        mixed = true;
      } else {
        ch[i] = diff(a[i], b[i]);
        if (ch[i].s !== 'same') mixed = true;
      }
    }
    return { s: mixed ? 'mixed' : 'same', t: 'array', ch };
  }

  // ── Count ────────────────────────────────────────────────────────
  function count(node, c = { added: 0, removed: 0, changed: 0, same: 0 }) {
    if (node.s === 'added')   { c.added++;   return c; }
    if (node.s === 'removed') { c.removed++; return c; }
    if (node.s === 'changed') { c.changed++; return c; }
    if (node.s === 'same' && !node.ch) { c.same++; return c; }
    if (node.ch) Object.values(node.ch).forEach(n => count(n, c));
    return c;
  }

  // ── Render value (inline, for leafs) ────────────────────────────
  function rVal(v) {
    const t = typeOf(v);
    if (t === 'null')    return `<span class="vnl">null</span>`;
    if (t === 'boolean') return `<span class="vb">${v}</span>`;
    if (t === 'number')  return `<span class="vn">${v}</span>`;
    if (t === 'string')  return `<span class="vs">"${esc(v)}"</span>`;
    if (t === 'array')   return `<span class="vnl">[…]</span>`;
    if (t === 'object')  return `<span class="vnl">{…}</span>`;
    return esc(String(v));
  }

  // ── Render tree ──────────────────────────────────────────────────
  function rNode(node, key, depth, last, inArr) {
    const ind   = '  '.repeat(depth);
    const comma = last ? '' : '<span class="p">,</span>';
    const keyH  = key === null ? '' :
      inArr
        ? `<span class="p idx">[${key}]</span> `
        : `<span class="k">"${esc(String(key))}"</span><span class="p">: </span>`;
    const cls = node.s === 'mixed' ? '' : node.s === 'same' ? '' : node.s;

    if (node.s === 'added') {
      return `<div class="dl added"><span class="ind">${ind}</span>${keyH}${rVal(node.v)}${comma}</div>`;
    }

    if (node.s === 'removed') {
      return `<div class="dl removed"><span class="ind">${ind}</span>${keyH}${rVal(node.v)}${comma}</div>`;
    }

    if (node.s === 'changed') {
      return `<div class="dl changed"><span class="ind">${ind}</span>${keyH}` +
             `<span class="from">${rVal(node.from)}</span>` +
             `<span class="arrow">→</span>` +
             `${rVal(node.to)}${comma}</div>`;
    }

    if (node.s === 'same' && !node.ch) {
      return `<div class="dl"><span class="ind">${ind}</span>${keyH}${rVal(node.v)}${comma}</div>`;
    }

    const open  = node.t === 'array' ? '[' : '{';
    const close = node.t === 'array' ? ']' : '}';
    const keys  = Object.keys(node.ch);
    let html = `<div class="dl ${cls}"><span class="ind">${ind}</span>${keyH}<span class="p">${open}</span></div>`;
    keys.forEach((k, i) => {
      html += rNode(node.ch[k], k, depth + 1, i === keys.length - 1, node.t === 'array');
    });
    html += `<div class="dl ${cls}"><span class="ind">${ind}</span><span class="p">${close}</span>${comma}</div>`;
    return html;
  }

  // ── Parse helper ─────────────────────────────────────────────────
  function parse(txt, statusEl) {
    txt = txt.trim();
    if (!txt) {
      statusEl.textContent = '';
      statusEl.className = 'pane-status';
      return [null, false];
    }
    try {
      const v = JSON.parse(txt);
      statusEl.textContent = '✓ valid';
      statusEl.className = 'pane-status ok';
      return [v, true];
    } catch (e) {
      const msg = e.message.replace(/^JSON\.parse:\s*/i, '').split('\n')[0];
      statusEl.textContent = '✗ ' + msg;
      statusEl.className = 'pane-status err';
      return [null, false];
    }
  }

  // ── State ─────────────────────────────────────────────────────────
  let pA = null, pB = null, hideUnch = false;

  const ia        = document.getElementById('ia');
  const ib        = document.getElementById('ib');
  const sa        = document.getElementById('sa');
  const sb        = document.getElementById('sb');
  const out       = document.getElementById('output');
  const toolbar   = document.getElementById('toolbar');
  const summary   = document.getElementById('summary');
  const toggleBtn = document.getElementById('toggleBtn');

  // ── Render diff ───────────────────────────────────────────────────
  function render() {
    if (!pA && !pB) {
      toolbar.style.display = 'none';
      out.innerHTML = `<div class="empty">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <path d="M4 8h22M4 15h14M4 22h18" stroke="#8B949E" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Paste JSON in both panels to compare
      </div>`;
      return;
    }
    if (!pA || !pB) {
      toolbar.style.display = 'none';
      out.innerHTML = `<div class="empty">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <circle cx="15" cy="15" r="12" stroke="#8B949E" stroke-width="2"/>
          <path d="M15 9v6M15 18v2" stroke="#8B949E" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Fix JSON errors to see the diff
      </div>`;
      return;
    }

    const node = diff(pA, pB);
    const c    = count(node);

    if (!c.added && !c.removed && !c.changed) {
      toolbar.style.display = 'none';
      out.innerHTML = `<div class="empty">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <circle cx="15" cy="15" r="12" stroke="#3FB950" stroke-width="2"/>
          <path d="M9 15l4 4 8-8" stroke="#3FB950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <strong>Identical</strong>
        <span style="font-size:13px">Both values are semantically equal — reformatting is ignored</span>
      </div>`;
      return;
    }

    summary.innerHTML = [
      c.added   && `<div class="pill add">+${c.added} added</div>`,
      c.removed && `<div class="pill rem">−${c.removed} removed</div>`,
      c.changed && `<div class="pill chg">~${c.changed} changed</div>`,
      c.same    && `<div class="pill eq">${c.same} unchanged</div>`,
    ].filter(Boolean).join('');

    toolbar.style.display = 'flex';

    const tree = document.createElement('div');
    tree.className = 'diff-tree' + (hideUnch ? ' hide-unch' : '');
    tree.innerHTML = rNode(node, null, 0, true, false);
    out.innerHTML = '';
    out.appendChild(tree);
  }

  // ── Input listeners ───────────────────────────────────────────────
let timerA, timerB;

ia.addEventListener('input', e => {
  [pA] = parse(e.target.value, sa);
  clearTimeout(timerA);
  timerA = setTimeout(render, 220);
});

ib.addEventListener('input', e => {
  [pB] = parse(e.target.value, sb);
  clearTimeout(timerB);
  timerB = setTimeout(render, 220);
});

  toggleBtn.addEventListener('click', () => {
    hideUnch = !hideUnch;
    toggleBtn.textContent = hideUnch ? 'Show unchanged' : 'Hide unchanged';
    toggleBtn.classList.toggle('active', hideUnch);
    document.querySelector('.diff-tree')?.classList.toggle('hide-unch', hideUnch);
  });

  // ── Demo ──────────────────────────────────────────────────────────
  ia.value = `{
  "name":    "Alice",
  "age":     30,
  "role":    "admin",
  "address": {
    "city": "New York",
    "zip":  "10001"
  },
  "tags": ["developer", "designer"],
  "active": true
}`;

  ib.value = `{"name":"Alice","age":31,"email":"alice@example.com","role":"admin","address":{"city":"Brooklyn","zip":"11201"},"tags":["developer","lead"],"active":true}`;

  [pA] = parse(ia.value, sa);
  [pB] = parse(ib.value, sb);
  render();
</script>
</body>
</html>
