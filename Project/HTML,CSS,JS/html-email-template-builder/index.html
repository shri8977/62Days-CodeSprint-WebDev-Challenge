<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Template Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F5F0;
    --ink:#1E2A42;
    --ink-soft:#4B5768;
    --ink-faint:#8A8578;
    --airmail-red:#C23B3B;
    --airmail-blue:#2C5A8C;
    --stamp-gold:#BD8B2E;
    --line:#DCD7CC;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .app{
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* ---- Top bar ---- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 28px;
    background:var(--ink);
    color:#fff;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .postmark{
    width:44px;height:44px;
    border-radius:50%;
    border:2px solid var(--stamp-gold);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    flex-shrink:0;
  }
  .postmark::before{
    content:"";
    position:absolute;
    inset:5px;
    border:1px dashed var(--stamp-gold);
    border-radius:50%;
  }
  .postmark span{
    font-family:'Special Elite',monospace;
    font-size:9px;
    color:var(--stamp-gold);
    letter-spacing:0.5px;
    text-align:center;
    line-height:1.1;
  }
  .brand h1{
    font-family:'Special Elite',monospace;
    font-size:20px;
    font-weight:400;
    margin:0;
    letter-spacing:0.5px;
  }
  .brand p{
    margin:2px 0 0;
    font-size:12.5px;
    color:#B9C2D0;
  }
  .actions{
    display:flex;
    gap:10px;
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:10px 16px;
    border-radius:7px;
    border:1px solid transparent;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:7px;
    transition:transform .12s ease, background .15s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{
    background:var(--airmail-red);
    color:#fff;
  }
  .btn-primary:hover{ background:#a92f2f; }
  .btn-ghost{
    background:transparent;
    color:#fff;
    border-color:rgba(255,255,255,0.28);
  }
  .btn-ghost:hover{ background:rgba(255,255,255,0.08); }

  /* ---- Main layout ---- */
  .main{
    display:flex;
    flex:1;
    min-height:0;
  }
  .sidebar{
    width:360px;
    flex-shrink:0;
    background:var(--card);
    border-right:1px solid var(--line);
    overflow-y:auto;
    max-height:calc(100vh - 82px);
  }
  .preview-wrap{
    flex:1;
    padding:32px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---- Sidebar sections ---- */
  .section{
    border-bottom:1px solid var(--line);
  }
  .section summary{
    list-style:none;
    cursor:pointer;
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    user-select:none;
  }
  .section summary::-webkit-details-marker{ display:none; }
  .eyebrow{
    font-family:'Special Elite',monospace;
    font-size:11px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--airmail-blue);
  }
  .chev{
    font-size:12px;
    color:var(--ink-faint);
    transition:transform .15s ease;
  }
  details[open] > summary .chev{ transform:rotate(90deg); }
  .section-body{
    padding:0 20px 20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .field label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .field input[type="text"],
  .field input[type="url"],
  .field textarea,
  .field select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    color:var(--ink);
    background:#fff;
  }
  .field textarea{ resize:vertical; min-height:64px; }
  .field input:focus,
  .field textarea:focus,
  .field select:focus{
    outline:2px solid var(--airmail-blue);
    outline-offset:1px;
  }
  .row2{ display:flex; gap:10px; }
  .row2 .field{ flex:1; }

  .color-field{ display:flex; align-items:center; gap:10px; }
  .color-field input[type="color"]{
    width:40px;height:36px;
    border:1px solid var(--line);
    border-radius:6px;
    padding:2px;
    background:#fff;
    cursor:pointer;
    flex-shrink:0;
  }
  .color-field input[type="text"]{ flex:1; }

  .range-field{ display:flex; align-items:center; gap:10px; }
  .range-field input[type="range"]{ flex:1; }
  .range-value{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    width:40px;
    text-align:right;
  }

  /* ---- Preview frame ---- */
  .frame-toolbar{
    width:100%;
    max-width:660px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .tabs{ display:flex; gap:6px; }
  .tab{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    padding:7px 14px;
    border-radius:6px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .tab.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  .live-badge{
    font-family:'Special Elite',monospace;
    font-size:11px;
    color:var(--airmail-blue);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .live-dot{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--airmail-blue);
    display:inline-block;
    animation:pulse 2s infinite ease-in-out;
  }
  @media (prefers-reduced-motion: reduce){
    .live-dot{ animation:none; }
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }

  .airmail-frame{
    width:100%;
    max-width:660px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 12px 32px rgba(30,42,66,0.12);
    overflow:hidden;
    border:1px solid var(--line);
  }
  .airmail-stripe{
    height:8px;
    width:100%;
    background:repeating-linear-gradient(
      -45deg,
      var(--airmail-red) 0 14px,
      #fff 14px 20px,
      var(--airmail-blue) 20px 34px,
      #fff 34px 40px
    );
  }
  #previewFrame{
    width:100%;
    height:720px;
    border:none;
    display:block;
  }
  .code-view{
    display:none;
    width:100%;
    height:720px;
    margin:0;
    padding:20px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    line-height:1.6;
    color:#DCE3EC;
    background:var(--ink);
    overflow:auto;
    white-space:pre-wrap;
    word-break:break-word;
    border-radius:0 0 10px 10px;
  }
  .copied-toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    padding:10px 18px;
    border-radius:7px;
    font-size:13.5px;
    font-weight:600;
    opacity:0;
    transition:opacity .2s ease, transform .2s ease;
    pointer-events:none;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .copied-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .copied-toast .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--airmail-red);
  }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  @media (max-width: 860px){
    .main{ flex-direction:column; }
    .sidebar{ width:100%; max-height:none; border-right:none; border-bottom:1px solid var(--line); }
    .preview-wrap{ padding:20px 14px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="postmark"><span>MAIL<br>BUILT</span></div>
      <div>
        <h1>Email Template Builder</h1>
        <p>Design the message. Export clean, client-safe HTML.</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="resetBtn">Reset</button>
      <button class="btn btn-ghost" id="copyBtn">Copy HTML</button>
      <button class="btn btn-primary" id="downloadBtn">Download .html</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar">

      <details class="section" open>
        <summary><span class="eyebrow">01 · Canvas</span><span class="chev">▶</span></summary>
        <div class="section-body">
          <div class="row2">
            <div class="field">
              <label for="containerWidth">Content width (px)</label>
              <input type="text" id="containerWidth" value="600">
            </div>
            <div class="field">
              <label for="fontFamily">Font</label>
              <select id="fontFamily">
                <option value="Arial, Helvetica, sans-serif">Arial</option>
                <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                <option value="Verdana, Geneva, sans-serif">Verdana</option>
                <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
                <option value="'Courier New', monospace">Courier New</option>
              </select>
            </div>
          </div>
          <div class="field color-field">
            <input type="color" id="pageBg" value="#EDEBE4">
            <div style="flex:1">
              <label>Page background</label>
              <input type="text" id="pageBgText" value="#EDEBE4">
            </div>
          </div>
          <div class="field color-field">
            <input type="color" id="contentBg" value="#FFFFFF">
            <div style="flex:1">
              <label>Content background</label>
              <input type="text" id="contentBgText" value="#FFFFFF">
            </div>
          </div>
        </div>
      </details>

      <details class="section" open>
        <summary><span class="eyebrow">02 · Header</span><span class="chev">▶</span></summary>
        <div class="section-body">
          <div class="field">
            <label for="brandName">Brand name</label>
            <input type="text" id="brandName" value="Nova Studio">
          </div>
          <div class="field">
            <label for="logoUrl">Logo image URL (optional)</label>
            <input type="url" id="logoUrl" placeholder="https://...">
          </div>
          <div class="field color-field">
            <input type="color" id="headerBg" value="#1E2A42">
            <div style="flex:1">
              <label>Header background</label>
              <input type="text" id="headerBgText" value="#1E2A42">
            </div>
          </div>
          <div class="field color-field">
            <input type="color" id="headerTextColor" value="#FFFFFF">
            <div style="flex:1">
              <label>Header text color</label>
              <input type="text" id="headerTextColorText" value="#FFFFFF">
            </div>
          </div>
        </div>
      </details>

      <details class="section" open>
        <summary><span class="eyebrow">03 · Message</span><span class="chev">▶</span></summary>
        <div class="section-body">
          <div class="field">
            <label for="heroUrl">Hero image URL (optional)</label>
            <input type="url" id="heroUrl" placeholder="https://...">
          </div>
          <div class="field">
            <label for="headingText">Heading</label>
            <input type="text" id="headingText" value="Big news for your inbox">
          </div>
          <div class="field">
            <label for="bodyText">Body text</label>
            <textarea id="bodyText">We've been working on something new and think you'll like it. Take a look below and let us know what you think.</textarea>
          </div>
          <div class="field color-field">
            <input type="color" id="headingColor" value="#1E2A42">
            <div style="flex:1">
              <label>Heading color</label>
              <input type="text" id="headingColorText" value="#1E2A42">
            </div>
          </div>
          <div class="field color-field">
            <input type="color" id="bodyTextColor" value="#4B5768">
            <div style="flex:1">
              <label>Body text color</label>
              <input type="text" id="bodyTextColorText" value="#4B5768">
            </div>
          </div>
        </div>
      </details>

      <details class="section" open>
        <summary><span class="eyebrow">04 · Button</span><span class="chev">▶</span></summary>
        <div class="section-body">
          <div class="row2">
            <div class="field">
              <label for="buttonText">Label</label>
              <input type="text" id="buttonText" value="Explore now">
            </div>
            <div class="field">
              <label for="buttonUrl">Link</label>
              <input type="url" id="buttonUrl" value="https://example.com">
            </div>
          </div>
          <div class="field color-field">
            <input type="color" id="buttonBg" value="#C23B3B">
            <div style="flex:1">
              <label>Button background</label>
              <input type="text" id="buttonBgText" value="#C23B3B">
            </div>
          </div>
          <div class="field color-field">
            <input type="color" id="buttonTextColor" value="#FFFFFF">
            <div style="flex:1">
              <label>Button text color</label>
              <input type="text" id="buttonTextColorText" value="#FFFFFF">
            </div>
          </div>
          <div class="field range-field">
            <label style="margin:0; flex-shrink:0; width:110px;">Corner radius</label>
            <input type="range" id="buttonRadius" min="0" max="28" value="6">
            <span class="range-value" id="buttonRadiusValue">6px</span>
          </div>
        </div>
      </details>

      <details class="section">
        <summary><span class="eyebrow">05 · Footer</span><span class="chev">▶</span></summary>
        <div class="section-body">
          <div class="field">
            <label for="footerText">Footer text</label>
            <textarea id="footerText">Nova Studio, 123 Market Street, San Francisco, CA</textarea>
          </div>
          <div class="field">
            <label for="unsubscribeText">Unsubscribe link label</label>
            <input type="text" id="unsubscribeText" value="Unsubscribe">
          </div>
          <div class="field color-field">
            <input type="color" id="footerBg" value="#F7F5F0">
            <div style="flex:1">
              <label>Footer background</label>
              <input type="text" id="footerBgText" value="#F7F5F0">
            </div>
          </div>
          <div class="field color-field">
            <input type="color" id="footerTextColor" value="#8A8578">
            <div style="flex:1">
              <label>Footer text color</label>
              <input type="text" id="footerTextColorText" value="#8A8578">
            </div>
          </div>
        </div>
      </details>

    </div>

    <div class="preview-wrap">
      <div class="frame-toolbar">
        <div class="tabs">
          <button class="tab active" id="tabPreview">Preview</button>
          <button class="tab" id="tabCode">HTML Code</button>
        </div>
        <div class="live-badge"><span class="live-dot"></span>Live preview</div>
      </div>
      <div class="airmail-frame">
        <div class="airmail-stripe"></div>
        <iframe id="previewFrame" title="Email preview"></iframe>
        <pre class="code-view" id="codeView"></pre>
      </div>
    </div>
  </div>
</div>

<div class="copied-toast" id="toast"><span class="dot"></span><span id="toastText">Copied</span></div>

<script>
  const ids = [
    'containerWidth','fontFamily','pageBg','contentBg',
    'brandName','logoUrl','headerBg','headerTextColor',
    'heroUrl','headingText','bodyText','headingColor','bodyTextColor',
    'buttonText','buttonUrl','buttonBg','buttonTextColor','buttonRadius',
    'footerText','unsubscribeText','footerBg','footerTextColor'
  ];

  const defaults = {};
  ids.forEach(id => {
    const el = document.getElementById(id);
    defaults[id] = el.value;
  });

  // Sync color pickers <-> text inputs
  const colorPairs = [
    ['pageBg','pageBgText'],['contentBg','contentBgText'],
    ['headerBg','headerBgText'],['headerTextColor','headerTextColorText'],
    ['headingColor','headingColorText'],['bodyTextColor','bodyTextColorText'],
    ['buttonBg','buttonBgText'],['buttonTextColor','buttonTextColorText'],
    ['footerBg','footerBgText'],['footerTextColor','footerTextColorText']
  ];
  colorPairs.forEach(([colorId, textId]) => {
    const colorEl = document.getElementById(colorId);
    const textEl = document.getElementById(textId);
    colorEl.addEventListener('input', () => { textEl.value = colorEl.value; render(); });
    textEl.addEventListener('input', () => {
      if (/^#[0-9A-Fa-f]{6}$/.test(textEl.value)) colorEl.value = textEl.value;
      render();
    });
  });

  document.getElementById('buttonRadius').addEventListener('input', (e) => {
    document.getElementById('buttonRadiusValue').textContent = e.target.value + 'px';
    render();
  });

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'SELECT' || el.type === 'text' || el.type === 'url' || el.tagName === 'TEXTAREA') {
      el.addEventListener('input', render);
    }
  });

  function esc(str){
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  function getVal(id){ return document.getElementById(id).value.trim(); }

  function generateHTML(){
    const width = parseInt(getVal('containerWidth')) || 600;
    const font = getVal('fontFamily');
    const pageBg = getVal('pageBg');
    const contentBg = getVal('contentBg');
    const brandName = getVal('brandName') || 'Your Brand';
    const logoUrl = getVal('logoUrl');
    const headerBg = getVal('headerBg');
    const headerTextColor = getVal('headerTextColor');
    const heroUrl = getVal('heroUrl');
    const headingText = getVal('headingText');
    const bodyText = getVal('bodyText');
    const headingColor = getVal('headingColor');
    const bodyTextColor = getVal('bodyTextColor');
    const buttonText = getVal('buttonText') || 'Click here';
    const buttonUrl = getVal('buttonUrl') || '#';
    const buttonBg = getVal('buttonBg');
    const buttonTextColor = getVal('buttonTextColor');
    const buttonRadius = getVal('buttonRadius');
    const footerText = getVal('footerText');
    const unsubscribeText = getVal('unsubscribeText') || 'Unsubscribe';
    const footerBg = getVal('footerBg');
    const footerTextColor = getVal('footerTextColor');

    const logoBlock = logoUrl
      ? `<img src="${esc(logoUrl)}" alt="${esc(brandName)}" width="140" style="display:block;border:0;max-width:140px;height:auto;">`
      : `<span style="font-family:${font};font-size:20px;font-weight:bold;color:${headerTextColor};letter-spacing:0.5px;">${esc(brandName)}</span>`;

    const heroBlock = heroUrl
      ? `<tr>
          <td style="padding:0;">
            <img src="${esc(heroUrl)}" alt="" width="${width}" style="display:block;width:100%;max-width:${width}px;height:auto;border:0;">
          </td>
        </tr>`
      : '';

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(brandName)}</title>
</head>
<body style="margin:0;padding:0;background-color:${pageBg};font-family:${font};">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:${pageBg};">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table role="presentation" width="${width}" cellpadding="0" cellspacing="0" border="0" style="width:${width}px;max-width:100%;background-color:${contentBg};border-collapse:collapse;">

        <!-- Header -->
        <tr>
          <td style="background-color:${headerBg};padding:24px 32px;text-align:left;">
            ${logoBlock}
          </td>
        </tr>
${heroBlock}
        <!-- Body -->
        <tr>
          <td style="padding:36px 32px 12px;">
            <h1 style="margin:0 0 16px;font-family:${font};font-size:24px;line-height:1.3;color:${headingColor};">${esc(headingText)}</h1>
            <p style="margin:0;font-family:${font};font-size:15px;line-height:1.6;color:${bodyTextColor};">${esc(bodyText)}</p>
          </td>
        </tr>

        <!-- Button -->
        <tr>
          <td style="padding:12px 32px 36px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="border-radius:${buttonRadius}px;background-color:${buttonBg};">
                  <a href="${esc(buttonUrl)}" target="_blank" style="display:inline-block;padding:13px 28px;font-family:${font};font-size:14px;font-weight:bold;color:${buttonTextColor};text-decoration:none;border-radius:${buttonRadius}px;">${esc(buttonText)}</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background-color:${footerBg};padding:24px 32px;text-align:left;">
            <p style="margin:0 0 8px;font-family:${font};font-size:12px;line-height:1.6;color:${footerTextColor};">${esc(footerText)}</p>
            <a href="#" style="font-family:${font};font-size:12px;color:${footerTextColor};text-decoration:underline;">${esc(unsubscribeText)}</a>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>`;
  }

  function render(){
    const html = generateHTML();
    document.getElementById('previewFrame').srcdoc = html;
    document.getElementById('codeView').textContent = html;
  }

  // Tabs
  const tabPreview = document.getElementById('tabPreview');
  const tabCode = document.getElementById('tabCode');
  const previewFrame = document.getElementById('previewFrame');
  const codeView = document.getElementById('codeView');

  tabPreview.addEventListener('click', () => {
    tabPreview.classList.add('active');
    tabCode.classList.remove('active');
    previewFrame.style.display = 'block';
    codeView.style.display = 'none';
  });
  tabCode.addEventListener('click', () => {
    tabCode.classList.add('active');
    tabPreview.classList.remove('active');
    previewFrame.style.display = 'none';
    codeView.style.display = 'block';
  });

  function showToast(text){
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  document.getElementById('copyBtn').addEventListener('click', () => {
    const html = generateHTML();
    const ta = document.createElement('textarea');
    ta.value = html;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    if (ok) {
      showToast('HTML copied to clipboard');
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(html).then(
        () => showToast('HTML copied to clipboard'),
        () => showToast('Copy failed — select the code manually')
      );
    } else {
      showToast('Copy failed — select the code manually');
    }
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    const html = generateHTML();
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const brand = (getVal('brandName') || 'email-template').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    a.href = url;
    a.download = (brand || 'email-template') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Template downloaded');
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    ids.forEach(id => {
      document.getElementById(id).value = defaults[id];
    });
    colorPairs.forEach(([colorId, textId]) => {
      document.getElementById(textId).value = document.getElementById(colorId).value;
    });
    document.getElementById('buttonRadiusValue').textContent = defaults.buttonRadius + 'px';
    render();
  });

  render();
</script>
</body>
</html>
